  var done=S.tripProjects.filter(function(p){return String(p['ステータス']||'').trim()==='完了';});
  var active=S.tripProjects.filter(function(p){return String(p['ステータス']||'').trim()!=='完了';});
  var html='';
  // Top bar
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">';
  html+='<button class="trip-add-btn" style="flex:1;margin-bottom:0;margin-right:10px" onclick="openNewProject()">';
  html+='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>新規プロジェクト</button>';
  html+='<button style="font-size:12px;color:var(--MU);display:flex;align-items:center;gap:4px;padding:8px 12px;border-radius:999px;background:var(--SFC);border:1px solid var(--BD);white-space:nowrap;flex-shrink:0" onclick="openCarSettings()">';
  html+='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>燃費設定</button>';
  html+='</div>';
  if(S.tripProjects.length===0){
    html+='<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg><p>プロジェクトがありません<br><span style="font-size:12px">上のボタンから作成してください</span></p><button onclick="S.tripProjects=null;switchFinTab(\'trips\')" style="margin-top:12px;padding:8px 18px;border-radius:999px;background:var(--SFC);border:1px solid var(--BD);color:var(--MU);font-size:12px;font-weight:600">再読み込み</button></div>';
    el.innerHTML=html; return;
  }
  if(active.length>0){
    html+='<div style="font-size:11px;font-weight:700;color:var(--MU);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">進行中</div>';
    html+=active.map(mkProjectCard).join('');
  }
  if(done.length>0){
    html+='<div style="font-size:11px;font-weight:700;color:var(--MU);text-transform:uppercase;letter-spacing:.06em;margin-top:16px;margin-bottom:8px">完了済み</div>';
    html+=done.map(mkProjectCard).join('');
  }
  el.innerHTML=html;
}

function mkProjectCard(p) {
  var isDone=String(p['ステータス']||'').trim()==='完了';
  var recs=(S.tripRecords&&S.tripRecords[p['ID']])||[];
  var totalCost=0; recs.forEach(function(r){totalCost+=calcTripCost(r).total;});
  var html='<div class="trip-proj-card" onclick="openTripDetail(\''+p['ID']+'\')">';
  html+='<div class="trip-proj-icon"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>';
  html+='<div class="trip-proj-body">';
  html+='<div class="trip-proj-name">'+esc(p['プロジェクト名'])+'</div>';
  var meta=[];
  if(recs.length>0) meta.push(recs.length+'件');
  if(totalCost>0) meta.push('¥'+totalCost.toLocaleString());
  if(p['作成日']) meta.push(p['作成日']);
  if(meta.length) html+='<div class="trip-proj-meta">'+esc(meta.join(' · '))+'</div>';
  html+='</div>';
  html+='<span class="trip-proj-status '+(isDone?'done':'active')+'">'+esc(p['ステータス'])+'</span>';
  html+='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--MU);flex-shrink:0"><polyline points="9 18 15 12 9 6"/></svg>';
  html+='</div>';
  return html;
}

// ── New project ──
function openNewProject() {
  document.getElementById('projname-input').value='';
  document.getElementById('projcreateov').classList.add('on');
  setTimeout(function(){ document.getElementById('projname-input').focus(); },100);
}
function closeProjCreate() {
  document.getElementById('projcreateov').classList.remove('on');
}
function confirmNewProject() {
  var name=(document.getElementById('projname-input').value||'').trim();
  if(!name){ document.getElementById('projname-input').style.borderColor='var(--NG)'; return; }
  closeProjCreate();
  var data={'プロジェクト名':name,'ステータス':'進行中'};
  google.script.run
    .withSuccessHandler(function(r){
      if(r&&r.success){
        data['ID']=r.id; data['_rowIndex']=r.rowIndex;
        if(!S.tripProjects) S.tripProjects=[];
        S.tripProjects.push(data);
        if(!S.tripRecords) S.tripRecords={};
        S.tripRecords[data['ID']]=[];
        renderTrips();
        showToast('プロジェクトを作成しました');
        openTripDetail(data['ID']);
      }
    })
    .withFailureHandler(function(e){ showToast('エラー: '+esc(String(e))); })
    .saveProject(data);
}

// ── Project detail ──
function openTripDetail(projId) {
  var proj=null;
  for(var i=0;i<(S.tripProjects||[]).length;i++){
    if(S.tripProjects[i]['ID']===projId){proj=S.tripProjects[i];break;}
  }
  if(!proj) return;
  S.activeProj=proj;
  S.tripTab='records';
  document.getElementById('tdtitle').textContent=proj['プロジェクト名'];
  var isDone=String(proj['ステータス']||'').trim()==='完了';
  var cb=document.getElementById('tdcomplete-btn');
  if(cb) cb.style.display=isDone?'none':'';
  document.querySelectorAll('.tdsn-btn').forEach(function(b){b.classList.toggle('on',b.dataset.ts==='records');});
  renderTripRecords();
  var foot=document.getElementById('tdfoot');
  if(foot) foot.style.display=isDone?'none':'block';
  document.getElementById('tripdetov').classList.add('on');
}
function closeTripDetail() {
  document.getElementById('tripdetov').classList.remove('on');
  S.activeProj=null;
}
function switchTripTab(ts) {
  S.tripTab=ts;
  document.querySelectorAll('.tdsn-btn').forEach(function(b){b.classList.toggle('on',b.dataset.ts===ts);});
  var foot=document.getElementById('tdfoot');
  if(foot) foot.style.display=(ts==='records'&&S.activeProj&&String(S.activeProj['ステータス']||'').trim()!=='完了')?'block':'none';
  if(ts==='records') renderTripRecords();
  else renderTripSettlement();
}

function renderTripRecords() {
  var el=document.getElementById('tdbody');
  if(!el||!S.activeProj) return;
  var recs=(S.tripRecords&&S.tripRecords[S.activeProj['ID']])||[];
  if(recs.length===0){
    el.innerHTML='<div class="empty"><p>記録がありません<br><span style="font-size:12px">「記録を追加」から入力してください</span></p></div>';
    return;
  }
  var sorted=recs.slice().sort(function(a,b){return (a['日付']||'').localeCompare(b['日付']||'');});
  var html=sorted.map(function(r){ return mkTripRecCard(r); }).join('');
  el.innerHTML=html;
}

function mkTripRecCard(r) {
  var costs=calcTripCost(r);
  var passengers=(r['乗車メンバー']||'').split(',').map(function(s){return s.trim();}).filter(function(s){return s;});
  var isProjectDone=S.activeProj&&String(S.activeProj['ステータス']||'').trim()==='完了';
  var html='<div class="trip-rec-card">';
  html+='<div class="trc-top" onclick="openEditRecord(\''+r['ID']+'\')" style="cursor:pointer">';
  html+='<div>';
  html+='<div class="trc-date">'+(r['日付']||'日付なし')+'</div>';
  if(r['目的']||r['目的地']){
    html+='<div class="trc-meta">'+esc([r['目的'],r['目的地']].filter(function(s){return s;}).join(' → '))+'</div>';
  }
  if(passengers.length>0){
    html+='<div class="trc-passengers">'+passengers.map(function(p){return '<span class="trc-pass-tag">'+esc(p)+'</span>';}).join('')+'</div>';
  }
  html+='</div>';
  if(r['運転者']||r['支払者']) html+='<span class="trc-payer">'+esc(r['運転者']||r['支払者'])+'が運転</span>';
  html+='</div>';
  var breakdown=[];
  if(costs.gas>0) breakdown.push('ガソリン¥'+costs.gas.toLocaleString()+(parseBool(r['往復'])?' (往復)':''));
  if(costs.highway>0) breakdown.push('高速¥'+costs.highway.toLocaleString()+(parseBool(r['ETC割引'])?'(ETC)':'')+(parseBool(r['往復'])?' (往復)':''));
  if(costs.parking>0) breakdown.push('駐車場¥'+costs.parking.toLocaleString());
  costs.others.forEach(function(o){ if(o.amount>0) breakdown.push(esc(o.label||'その他')+'¥'+(parseInt(o.amount)||0).toLocaleString()); });
  html+='<div class="trc-cost-row">';
  html+='<div class="trc-breakdown">'+breakdown.join(' · ')+'</div>';
  html+='<div style="display:flex;align-items:center;gap:8px">';
  html+='<div class="trc-total">¥'+costs.total.toLocaleString()+'</div>';
  if(!isProjectDone){
    html+='<button type="button" class="trc-dup-btn" onclick="event.stopPropagation();duplicateRecord(\''+r['ID']+'\')" title="複製">';
    html+='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    html+='</button>';
  }
  html+='</div>';
  html+='</div>';
  html+='</div>';
  return html;
}

function toggleSettleRow(i) {
  var row=document.getElementById('settle-row-'+i);
  var chev=document.getElementById('settle-chev-'+i);
  if(!row) return;
  var open=row.style.display==='none'||row.style.display==='';

function renderTripSettlement() {
  var el=document.getElementById('tdbody');
  if(!el||!S.activeProj) return;
  var recs=(S.tripRecords&&S.tripRecords[S.activeProj['ID']])||[];
  if(recs.length===0){
    el.innerHTML='<div class="empty"><p>記録がありません</p></div>';
    return;
  }
  var res=calcProjectSettlement(recs);
  var fams=['Rinka','Airi','Miha'];
  var html='';
  // 各自の収支
  html+='<div class="settle-card">';
  html+='<div class="settle-ttl">収支サマリー</div>';
  fams.forEach(function(f){
    var n=res.net[f];
    html+='<div class="settle-person-row">';
    html+='<span class="settle-name">'+esc(f)+'</span>';
    html+='<div class="settle-amounts">';
    html+='<div class="settle-paid-lbl">支払 ¥'+res.paid[f].toLocaleString()+' / 負担 ¥'+res.owed[f].toLocaleString()+'</div>';
    var cls=n>0?'pos':(n<0?'neg':'zero');
    var sign=n>0?'+':'';
    html+='<div class="settle-net '+cls+'">'+sign+n.toLocaleString()+'円</div>';
    html+='</div></div>';
  });
  html+='</div>';
  // 内訳（各記録）
  html+='<div style="font-size:11px;font-weight:700;color:var(--MU);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">内訳</div>';
  html+='<div id="settle-breakdown-wrap">';
  recs.forEach(function(r,i){
    var costs=calcTripCost(r);
    var total=costs.total;
    var psgr=(r['乗車メンバー']||'').split(',').map(function(s){return s.trim();}).filter(function(s){return s;});
    html+='<div onclick="toggleSettleRow('+i+')" style="background:var(--SFC);border-radius:10px;border:1px solid var(--BD);margin-bottom:6px;overflow:hidden;cursor:pointer">';
    html+='<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 12px">';
    html+='<div style="font-size:13px;font-weight:600">'+(r['日付']?fmtD(r['日付'])+' ':'')+esc(r['目的']||r['目的地']||'記録'+(i+1))+'</div>';
    html+='<div style="display:flex;align-items:center;gap:8px;flex-shrink:0">';
    html+='<span style="font-size:13px;font-weight:700">¥'+total.toLocaleString()+'</span>';
    html+='<svg id="settle-chev-'+i+'" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" style="transition:transform .2s;color:var(--MU)"><polyline points="6 9 12 15 18 9"/></svg>';
    html+='</div></div>';
    html+='<div id="settle-row-'+i+'" style="display:none;padding:0 12px 10px;font-size:12px;color:var(--MU)">';
    html+='<div style="margin-bottom:6px">支払者: <b>'+esc(r['支払者']||'未設定')+'</b> / 乗車: <b>'+(psgr.join('・')||'未設定')+'</b></div>';
    // 交通・駐車費（乗車メンバー割り）
    var sharedCost=costs.gas+costs.highway+costs.parking;
    if(sharedCost>0){
      function costRow(lbl,amt){ return '<div style="display:flex;justify-content:space-between;padding:2px 0"><span>'+lbl+'</span><span>¥'+amt.toLocaleString()+'</span></div>'; }
      if(costs.gas>0) html+=costRow('ガソリン代',costs.gas);
      if(costs.highway>0) html+=costRow('高速代',costs.highway);
      if(costs.parking>0) html+=costRow('駐車場代',costs.parking);
      if(psgr.length>0) html+='<div style="display:flex;justify-content:space-between;padding:4px 0;margin-top:2px;border-top:1px dashed var(--BD);font-weight:600;color:var(--TX)"><span>一人当たり（÷'+psgr.length+'人）</span><span>¥'+Math.floor(sharedCost/psgr.length).toLocaleString()+'</span></div>';
    }
    // その他費用：人別グループ
    var validOthers=costs.others.filter(function(o){ return (parseInt(o.amount)||0)>0&&Array.isArray(o.targets)&&o.targets.length>0; });
    if(validOthers.length>0){
      html+='<div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--BD)">';
      html+='<div style="font-weight:600;margin-bottom:4px;color:var(--TX)">その他費用</div>';
      S.fams.forEach(function(fam){
        var myItems=validOthers.filter(function(o){ return o.targets.indexOf(fam)>=0; });
        if(myItems.length===0) return;
        var myTotal=myItems.reduce(function(s,o){ return s+Math.floor((parseInt(o.amount)||0)/o.targets.length); },0);
        html+='<div style="margin-bottom:4px">';
        html+='<div style="font-weight:700;color:var(--TX);padding:1px 0">'+esc(fam)+'</div>';
        myItems.forEach(function(o){
          var perAmt=Math.floor((parseInt(o.amount)||0)/o.targets.length);
          html+='<div style="display:flex;justify-content:space-between;padding:2px 0 2px 8px"><span>'+esc(o.label||'その他')+(o.targets.length>1?' （÷'+o.targets.length+'人）':'')+'</span><span>¥'+perAmt.toLocaleString()+'</span></div>';
        });
        if(myItems.length>1) html+='<div style="display:flex;justify-content:space-between;padding:4px 0 2px 8px;border-top:1px dashed var(--BD);font-weight:600;color:var(--TX)"><span>小計</span><span>¥'+myTotal.toLocaleString()+'</span></div>';
        html+='</div>';
      });
      html+='</div>';
    }
    html+='</div></div>';
  });
  html+='</div>';
  // 精算方法
  if(res.transfers.length===0){
    html+='<div class="settle-card" style="text-align:center;padding:20px"><div style="font-size:16px;font-weight:700;color:var(--OK-t)">精算不要</div><div style="font-size:13px;color:var(--MU);margin-top:4px">全員の負担が均等です</div></div>';
  } else {
    html+='<div style="font-size:11px;font-weight:700;color:var(--MU);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 10px">精算方法</div>';
    res.transfers.forEach(function(t){
      html+='<div class="settle-transfer">';
      html+='<div class="settle-arrow">';
      html+='<span class="settle-from">'+esc(t.from)+'</span>';
      html+='<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--MU)"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>';
      html+='<span class="settle-to">'+esc(t.to)+'</span>';
      html+='</div>';
      html+='<div class="settle-amount">¥'+t.amount.toLocaleString()+'</div>';
      html+='</div>';
    });
  }
  el.innerHTML=html;
}

// Complete / delete project
function completeTripProject() {
  if(!S.activeProj) return;
  showCon('プロジェクトを完了にする', '完了にすると記録の追加ができなくなります。よろしいですか？', false, function(){
    S.activeProj['ステータス']='完了';
    google.script.run
      .withSuccessHandler(function(r){
        if(r&&r.success){
          for(var i=0;i<S.tripProjects.length;i++){
            if(S.tripProjects[i]['ID']===S.activeProj['ID']){S.tripProjects[i]=S.activeProj;break;}

          document.getElementById('tdcomplete-btn').style.display='none';
          var foot=document.getElementById('tdfoot'); if(foot) foot.style.display='none';
          renderTrips();
          showToast('完了にしました');

      })

function deleteTripProjectConfirm() {
  if(!S.activeProj) return;
  showCon('プロジェクトを削除', 'このプロジェクトとすべての記録を削除します。この操作は取り消せません。', true, function(){
    google.script.run
      .withSuccessHandler(function(r){
        if(r&&r.success){
          S.tripProjects=S.tripProjects.filter(function(p){return p['ID']!==S.activeProj['ID'];});

          closeTripDetail();
          renderTrips();
          showToast('削除しました');

}

function getFuelEff(driverName) {
  if(!S.carSettings||!S.carSettings.length) return 15;
  for(var i=0;i<S.carSettings.length;i++){
    var nm=String(S.carSettings[i]['名前']||'');
    if(nm.indexOf(driverName)>=0){
      var fe=parseFloat(S.carSettings[i]['燃費']);
      return isNaN(fe)?15:fe;
    }
  }
  return 15;
}

function buildRecordForm(r) {
  var fams=S.fams;
  var today=new Date(); var todayStr=today.getFullYear()+'-'+('0'+(today.getMonth()+1)).slice(-2)+'-'+('0'+today.getDate()).slice(-2);
  var dateVal=r?r['日付']:todayStr;
  var purpose=r?r['目的']:'';
  var dest=r?r['目的地']:'';
  var driver=r?(r['運転者']||r['支払者']):'';
  var passArr=(r&&r['乗車メンバー'])?(r['乗車メンバー'].split(',').map(function(s){return s.trim();})):[];
  // Parse IC fields from stored "A→B" format
  var highwaySec=r?r['高速区間']:'';
  var hwFrom='', hwTo='';
  if(highwaySec&&highwaySec.indexOf('→')>=0){
    var hwParts=highwaySec.split('→'); hwFrom=hwParts[0].trim(); hwTo=hwParts.slice(1).join('→').trim();
  } else if(highwaySec){ hwFrom=highwaySec; }
  var highwayAmt=r?(parseInt(r['高速料金'])||0):'';
  var roundTrip=r?parseBool(r['往復']):true;
  var gasPerL=r?(parseFloat(r['ガソリン単価'])||''):'';
  var dist=r?(parseFloat(r['走行距離'])||''):'';
  var fe=r?(parseFloat(r['燃費'])||getFuelEff(driver)):getFuelEff(driver);
  var hasParking=r?parseBool(r['駐車場有無']):false;
  var parkingAmt=r?(parseInt(r['駐車場料金'])||''):'';
  var others=[];
  if(r&&r['その他費用JSON']){ try{others=JSON.parse(r['その他費用JSON']);}catch(e){} }
  if(!Array.isArray(others)) others=[];

  var html='';
  // Date + purpose + dest
  html+='<div class="fs"><div class="fst">基本情報</div>';
  html+='<div class="fg"><label class="fl">日付</label><input type="date" id="tr-date" class="fi" value="'+esc(dateVal)+'" onchange="onTRDateChange(this.value)"></div>';
  html+='<div class="fg"><label class="fl">目的</label><input type="text" id="tr-purpose" class="fi" value="'+esc(purpose)+'" placeholder="例: NUMBER練習"></div>';
  html+='<div class="fg"><label class="fl">目的地</label><input type="text" id="tr-dest" class="fi" value="'+esc(dest)+'" placeholder="例: 〇〇ダンススタジオ"></div>';
  html+='</div>';

  // Driver（＝支払者） + passengers
  html+='<div class="fs"><div class="fst">メンバー</div>';
  html+='<div class="fg" style="margin-bottom:12px"><label class="fl">運転者（支払者）</label><select id="tr-driver" class="fsl" onchange="onTRDriverChange(this.value)"><option value="">選択</option>';
  fams.forEach(function(f){ html+='<option value="'+esc(f)+'"'+(driver===f?' selected':'')+'>'+esc(f)+'</option>'; });
  html+='</select></div>';
  html+='<div class="fg"><label class="fl">乗車メンバー（複数選択可）</label>';
  html+='<div class="member-toggle-wrap" id="tr-passengers">';
  fams.forEach(function(f){
    var on=passArr.indexOf(f)>=0;
    html+='<button type="button" class="mtog'+(on?' on':'')+'" onclick="togglePassenger(this,\''+esc(f)+'\')">'+esc(f)+'</button>';
  });
  html+='</div></div>';
  html+='</div>';

  // Highway
  html+='<div class="fs"><div class="fst">高速道路</div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:8px">';
  html+='<div class="fg" style="margin-bottom:0"><label class="fl">出発IC</label><input type="text" id="tr-hw-from" class="fi" value="'+esc(hwFrom)+'" placeholder="例: 桑名" oninput="onICChange()"></div>';
  html+='<div class="fg" style="margin-bottom:0"><label class="fl">到着IC</label><input type="text" id="tr-hw-to" class="fi" value="'+esc(hwTo)+'" placeholder="例: 名古屋西" oninput="onICChange()"></div>';
  html+='</div>';
  html+='<div id="tr-route-hint" style="font-size:12px;margin-bottom:6px;display:none"></div>';
  html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">';
  html+='<div class="fg" style="margin-bottom:0;flex:1"><label class="fl">片道料金（円）</label><input type="number" id="tr-hw-amt" class="fi" value="'+esc(String(highwayAmt))+'" placeholder="0" min="0" oninput="onICChange();updateGasCalc()"></div>';
  html+='<button type="button" id="tr-route-save-btn" onclick="saveRouteFromForm()" style="display:none;flex-shrink:0;margin-top:18px;padding:8px 12px;border-radius:999px;background:var(--YBG);color:var(--Y);font-size:12px;font-weight:700;border:1px solid rgba(200,162,0,.3)">☆ 保存</button>';
  html+='</div>';
  html+='<label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:4px 0;margin-bottom:0">';
  html+='<input type="checkbox" id="tr-roundtrip" style="width:20px;height:20px;accent-color:var(--Y)"'+(roundTrip?' checked':'')+' onchange="updateGasCalc()"> 往復（距離・高速料金を2倍で計算）';
  html+='</label>';
  html+='</div>';

  // Gas
  html+='<div class="fs"><div class="fst">ガソリン代</div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:8px">';
  html+='<div class="fg" style="margin-bottom:0"><label class="fl">単価（円/L）</label><input type="number" id="tr-gas-price" class="fi" value="'+esc(String(gasPerL))+'" placeholder="例: 168" min="0" step="0.1" oninput="updateGasCalc()"></div>';
  html+='<div class="fg" style="margin-bottom:0"><label class="fl">片道距離（km）</label><input type="number" id="tr-distance" class="fi" value="'+esc(String(dist))+'" placeholder="例: 60" min="0" step="0.1" oninput="updateGasCalc()"></div>';
  html+='<div class="fg" style="margin-bottom:0"><label class="fl">燃費（km/L）</label><input type="number" id="tr-fuel-eff" class="fi" value="'+esc(String(fe))+'" placeholder="15" min="1" step="0.1" oninput="updateGasCalc()"></div>';
  html+='</div>';
  html+='<div id="gas-calc-display" class="gas-calc-display" style="display:none"></div>';
  html+='</div>';

  // Parking
  html+='<div class="fs"><div class="fst">駐車場</div>';
  html+='<label style="display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer;padding:4px 0;margin-bottom:8px">';
  html+='<input type="checkbox" id="tr-parking-chk" style="width:20px;height:20px;accent-color:var(--Y)"'+(hasParking?' checked':'')+' onchange="toggleParkingInput()"> 駐車場利用';
  html+='</label>';
  html+='<div id="tr-parking-wrap" style="display:'+(hasParking?'block':'none')+'">';
  html+='<div class="fg"><label class="fl">駐車場代（円）</label><input type="number" id="tr-parking-amt" class="fi" value="'+esc(String(parkingAmt))+'" placeholder="0" min="0"></div>';
  html+='</div></div>';

  // Other expenses
  html+='<div class="fs"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><span class="fst" style="margin-bottom:0">その他費用</span>';
  html+='<button type="button" style="font-size:12px;font-weight:700;color:var(--Y);display:flex;align-items:center;gap:3px;padding:4px 8px;border-radius:999px;background:var(--YBG)" onclick="addOtherExp()">+ 追加</button></div>';
  html+='<div id="other-exp-list">';
  others.forEach(function(o,i){ html+=buildOtherExpRow(i,o.label||'',parseInt(o.amount)||0,o.targets||[]); _otherExpCount++; });
  if(others.length===0) html+='<div id="other-exp-empty" style="font-size:13px;color:var(--MU);padding:4px 0">費用を追加するには上の「+ 追加」を押してください</div>';
  html+='</div></div>';

  document.getElementById('triprecform').innerHTML=html;
  updateGasCalc();
  onICChange();
}

function buildOtherExpRow(idx,label,amount,targets) {
  var fams=S.fams;
  var html='<div class="other-exp-row" id="other-exp-row-'+idx+'">';
  html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">';
  html+='<span style="font-size:12px;font-weight:700;color:var(--MU)">費用 '+(idx+1)+'</span>';
  html+='<button type="button" class="trh-del" onclick="removeOtherExp('+idx+')" style="padding:2px"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>';
  html+='</div>';
  html+='<div class="frow" style="margin-bottom:8px">';
  html+='<div class="fg" style="flex:2"><label class="fl">費用名</label><input type="text" id="oexp-label-'+idx+'" class="fi" value="'+esc(label)+'" placeholder="例: 昼食代"></div>';
  html+='<div class="fg"><label class="fl">金額（円）</label><input type="number" id="oexp-amt-'+idx+'" class="fi" value="'+(amount||'')+'" placeholder="0" min="0"></div>';
  html+='</div>';
  html+='<div class="fg"><label class="fl">対象者</label>';
  html+='<div class="member-toggle-wrap" id="oexp-targets-'+idx+'">';
  fams.forEach(function(f){
    var on=targets.indexOf(f)>=0;
    html+='<button type="button" class="mtog'+(on?' on':'')+'" onclick="toggleMember(this,\''+esc(f)+'\')">'+esc(f)+'</button>';
  });
  html+='</div></div>';
  html+='</div>';
  return html;
}

function addOtherExp() {
  var empty=document.getElementById('other-exp-empty');
  if(empty) empty.remove();
  var list=document.getElementById('other-exp-list');
  if(!list) return;
  var row=document.createElement('div');
  row.innerHTML=buildOtherExpRow(_otherExpCount,'',0,[]);
  list.appendChild(row.firstChild);
  _otherExpCount++;
}
function removeOtherExp(idx) {
  var row=document.getElementById('other-exp-row-'+idx);
  if(row) row.remove();
  var list=document.getElementById('other-exp-list');
  if(list&&!list.querySelector('.other-exp-row')){
    list.innerHTML='<div id="other-exp-empty" style="font-size:13px;color:var(--MU);padding:4px 0">費用を追加するには「+ 追加」を押してください</div>';
  }
}

function togglePassenger(btn) {
  btn.classList.toggle('on');
}
function toggleMember(btn) {
  btn.classList.toggle('on');
}

function onTRDateChange(val) {
  updateGasCalc();
}
function onICChange() {
  var from=(document.getElementById('tr-hw-from')||{}).value||'';
  var to=(document.getElementById('tr-hw-to')||{}).value||'';
  var hint=document.getElementById('tr-route-hint');
  var saveBtn=document.getElementById('tr-route-save-btn');
  if(!hint||!saveBtn) return;
  var fromN=from.trim(); var toN=to.trim();
  if(!fromN||!toN){ hint.style.display='none'; saveBtn.style.display='none'; return; }
  // 保存済みルートを検索
  var match=null;
  (S.savedRoutes||[]).forEach(function(r){
    if(String(r['出発IC']).trim()===fromN&&String(r['到着IC']).trim()===toN) match=r;
  });
  if(match) {
    // 自動補完
    var amtEl=document.getElementById('tr-hw-amt');
    if(amtEl&&(!amtEl.value||amtEl.value==='0')) amtEl.value=parseInt(match['片道料金'])||0;
    hint.style.display='block';
    hint.innerHTML='<span style="color:var(--OK-t);background:var(--OK-bg);padding:2px 8px;border-radius:999px">✓ 保存済みルート ¥'+(parseInt(match['片道料金'])||0).toLocaleString()+'</span>';
    saveBtn.style.display='block';
    saveBtn.textContent='✎ 更新';
    saveBtn.disabled=false;
    updateGasCalc();
  } else {
    hint.style.display='none';
    // IC と料金が揃っていれば保存ボタンを表示
    var amt=parseFloat((document.getElementById('tr-hw-amt')||{}).value)||0;
    saveBtn.style.display=(amt>0)?'block':'none';
  }
}
function saveRouteFromForm() {
  var from=(document.getElementById('tr-hw-from')||{}).value||'';
  var to=(document.getElementById('tr-hw-to')||{}).value||'';
  var amt=parseFloat((document.getElementById('tr-hw-amt')||{}).value)||0;
  if(!from.trim()||!to.trim()||!amt) return;
  var btn=document.getElementById('tr-route-save-btn');
  if(btn){ btn.disabled=true; btn.textContent='保存中...'; }
  google.script.run
    .withSuccessHandler(function(r){
      if(r&&r.success){
        var newRoute={'出発IC':from.trim(),'到着IC':to.trim(),'片道料金':amt,'_rowIndex':r.rowIndex};
        S.savedRoutes=S.savedRoutes.filter(function(x){return !(String(x['出発IC']).trim()===from.trim()&&String(x['到着IC']).trim()===to.trim());});
        S.savedRoutes.push(newRoute);
        onICChange(); // ヒントを更新
        showToast('ルートを保存しました');
      }
    })
    .withFailureHandler(function(){
      if(btn){ btn.disabled=false; btn.textContent='☆ 保存'; }
      showToast('保存に失敗しました');
    })
    .saveRoute(from.trim(), to.trim(), amt);
}
function onTRDriverChange(val) {
  var feEl=document.getElementById('tr-fuel-eff');
  if(feEl) feEl.value=getFuelEff(val);
  updateGasCalc();
}
function toggleParkingInput() {
  var chk=document.getElementById('tr-parking-chk');
  var wrap=document.getElementById('tr-parking-wrap');
  if(wrap) wrap.style.display=chk&&chk.checked?'block':'none';
}
function updateGasCalc() {
  var p=parseFloat((document.getElementById('tr-gas-price')||{}).value)||0;
  var d=parseFloat((document.getElementById('tr-distance')||{}).value)||0;
  var fe=parseFloat((document.getElementById('tr-fuel-eff')||{}).value)||15;
  var rt=(document.getElementById('tr-roundtrip')||{}).checked;
  var totalDist=rt?d*2:d;
  var gas=(p>0&&totalDist>0&&fe>0)?Math.floor(p*totalDist/fe):0;
  var hwAmt=parseFloat((document.getElementById('tr-hw-amt')||{}).value)||0;
  var totalHw=rt?hwAmt*2:hwAmt;
  var highway=totalHw;
  var el=document.getElementById('gas-calc-display');
  if(!el) return;
  var parts=[];
  if(gas>0) parts.push('ガソリン代'+(rt?' (往復)':'')+' ¥'+gas.toLocaleString());
  if(highway>0) parts.push('高速'+(rt?' (往復)':'')+' ¥'+highway.toLocaleString());
  if(parts.length>0){ el.style.display='block'; el.textContent=parts.join(' + '); }
  else el.style.display='none';
}

function saveTripRecordForm() {
  if(!S.activeProj) return;
  var btn=document.getElementById('trsave-btn');
  if(btn){ btn.disabled=true; btn.style.opacity='.4'; }

  // Collect form data
  var date=(document.getElementById('tr-date')||{}).value||'';
  var purpose=(document.getElementById('tr-purpose')||{}).value||'';
  var dest=(document.getElementById('tr-dest')||{}).value||'';
  var driver=(document.getElementById('tr-driver')||{}).value||'';
  // Passengers
  var passEls=document.querySelectorAll('#tr-passengers .mtog.on');
  var passengers=Array.prototype.map.call(passEls,function(b){return b.textContent.trim();});
  var hwFrom=(document.getElementById('tr-hw-from')||{}).value||'';
  var hwTo=(document.getElementById('tr-hw-to')||{}).value||'';
  var highwaySec=hwFrom&&hwTo?(hwFrom+'→'+hwTo):(hwFrom||hwTo);
  var highwayAmt=parseInt((document.getElementById('tr-hw-amt')||{}).value)||0;
  var roundTrip=(document.getElementById('tr-roundtrip')||{}).checked?true:false;
  var gasPrice=parseFloat((document.getElementById('tr-gas-price')||{}).value)||0;
  var distance=parseFloat((document.getElementById('tr-distance')||{}).value)||0;
  var fuelEff=parseFloat((document.getElementById('tr-fuel-eff')||{}).value)||15;
  var hasParking=(document.getElementById('tr-parking-chk')||{}).checked?true:false;
  var parkingAmt=hasParking?(parseInt((document.getElementById('tr-parking-amt')||{}).value)||0):0;
  // Other expenses
  var others=[];
  document.querySelectorAll('.other-exp-row').forEach(function(row){
    var id=row.id.replace('other-exp-row-','');
    var lbl=((document.getElementById('oexp-label-'+id)||{}).value||'').trim();
    var amt=parseInt((document.getElementById('oexp-amt-'+id)||{}).value)||0;
    var tgts=[];
    var tgtEls=document.querySelectorAll('#oexp-targets-'+id+' .mtog.on');
    tgtEls.forEach(function(b){ tgts.push(b.textContent.trim()); });
    if(lbl||amt>0) others.push({label:lbl,amount:amt,targets:tgts});
  });

  var data={
    'プロジェクトID': S.activeProj['ID'],
    '日付': date, '目的': purpose, '目的地': dest,
    '支払者': driver, '運転者': driver,
    '乗車メンバー': passengers.join(','),
    '高速区間': highwaySec, '高速料金': highwayAmt, 'ETC割引': false,
    '往復': roundTrip,
    'ガソリン単価': gasPrice, '走行距離': distance, '燃費': fuelEff,
    '駐車場有無': hasParking, '駐車場料金': parkingAmt,
    'その他費用JSON': others.length>0?JSON.stringify(others):''
  };
  if(S.editRecordData){ data['ID']=S.editRecordData['ID']; data['_rowIndex']=S.editRecordData['_rowIndex']; }

  google.script.run
    .withSuccessHandler(function(r){
      if(btn){ btn.disabled=false; btn.style.opacity=''; }
      if(r&&r.success){
        data['ID']=r.id; data['_rowIndex']=r.rowIndex;
        if(!S.tripRecords) S.tripRecords={};
        if(!S.tripRecords[S.activeProj['ID']]) S.tripRecords[S.activeProj['ID']]=[];
        var recs=S.tripRecords[S.activeProj['ID']];
        var found=false;
        for(var i=0;i<recs.length;i++){
          if(recs[i]['ID']===data['ID']){ recs[i]=data; found=true; break; }
        }
        if(!found) recs.push(data);
        closeTripRecord();
        renderTripRecords();
        renderTrips();
        showToast('保存しました');
      }else{ showToast('保存失敗'); }
    })
    .withFailureHandler(function(e){
      if(btn){ btn.disabled=false; btn.style.opacity=''; }
      showToast('エラー: '+esc(String(e)));
    })
    .saveTripRecord(data);
}

function deleteTripRecordConfirm() {
  if(!S.editRecordData) return;
  showCon('記録を削除', 'この記録を削除します。よろしいですか？', true, function(){
    var row=S.editRecordData['_rowIndex'];
    var recId=S.editRecordData['ID'];
    google.script.run
      .withSuccessHandler(function(r){
        if(r&&r.success){
          var projId=S.activeProj['ID'];
          if(S.tripRecords&&S.tripRecords[projId]){
            S.tripRecords[projId]=S.tripRecords[projId].filter(function(rec){return rec['ID']!==recId;});
          }
          closeTripRecord();
          renderTripRecords();
          renderTrips();
          showToast('削除しました');
        }
      })
      .deleteTripRecord(row);
  }, 'danger');
}

function duplicateRecord(recId) {
  if(!S.activeProj) return;
  var recs=(S.tripRecords&&S.tripRecords[S.activeProj['ID']])||[];
  var orig=null;
  for(var i=0;i<recs.length;i++){if(recs[i]['ID']===recId){orig=recs[i];break;}}
  if(!orig) return;
  var copy={};
  var keys=['プロジェクトID','日付','目的','目的地','支払者','運転者','乗車メンバー','高速区間','高速料金','ETC割引','往復','ガソリン単価','走行距離','燃費','駐車場有無','駐車場料金','その他費用JSON'];
  keys.forEach(function(k){ copy[k]=orig[k]!==undefined?orig[k]:''; });
  copy['プロジェクトID']=S.activeProj['ID'];
  google.script.run
    .withSuccessHandler(function(r){
      if(r&&r.success){
        copy['ID']=r.id; copy['_rowIndex']=r.rowIndex;
        if(!S.tripRecords[S.activeProj['ID']]) S.tripRecords[S.activeProj['ID']]=[];
        S.tripRecords[S.activeProj['ID']].push(copy);
        renderTripRecords();
        renderTrips();
        showToast('記録を複製しました');
      }
    })
    .withFailureHandler(function(e){ showToast('複製失敗: '+esc(String(e))); })
    .saveTripRecord(copy);
}

// ── Car settings ──
function openCarSettings() {
  buildCarSettingsForm();
  document.getElementById('carsetov').classList.add('on');
}
function closeCarSettings() {
  document.getElementById('carsetov').classList.remove('on');
}
function buildCarSettingsForm() {
  var fams=S.fams;
  // Ensure we have entries for each family
  var settingsMap={};
  (S.carSettings||[]).forEach(function(c){ settingsMap[c['名前']]=c; });
  var html='';
  fams.forEach(function(f){
    var carName=f+'の車';
    var entry=settingsMap[carName]||{};
    var fe=parseFloat(entry['燃費'])||15;
    html+='<div class="carset-row">';
    html+='<div>';
    html+='<div class="carset-name">'+esc(carName)+'</div>';
    html+='<div style="font-size:11px;color:var(--MU)">'+esc(f)+'が運転する車</div>';
    html+='</div>';
    html+='<div style="display:flex;align-items:center;gap:6px">';
    html+='<input type="number" id="carfe-'+esc(f)+'" class="fi" style="width:70px;text-align:right;padding:8px 10px" value="'+fe+'" min="1" step="0.1">';
    html+='<span style="font-size:12px;color:var(--MU);white-space:nowrap">km/L</span>';
    html+='</div>';
    html+='</div>';
  });
  document.getElementById('carset-body').innerHTML=html;
}
function saveCarSettingsForm() {
  var fams=S.fams;
  var cars=fams.map(function(f){
    var fe=parseFloat((document.getElementById('carfe-'+f)||{}).value)||15;
    return {'名前':f+'の車','燃費':fe};
  });
  google.script.run
    .withSuccessHandler(function(r){
      if(r&&r.success){
        S.carSettings=cars;
        closeCarSettings();
        showToast('燃費設定を保存しました');
      }
    })
    .withFailureHandler(function(e){ showToast('エラー: '+esc(String(e))); })
    .saveCarSettings(cars);
}
