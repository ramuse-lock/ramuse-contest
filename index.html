<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="RAMUSE">
  <meta name="theme-color" content="#efefec">
  <link rel="apple-touch-icon" id="apple-icon">
  <title>RAMUSE</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;width:100%;max-width:100vw;overflow:hidden;
      background:#efefec;font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Helvetica Neue',sans-serif}
    @media(prefers-color-scheme:dark){html,body{background:#131516}}
    iframe{width:100%;height:100%;border:none;display:block}

    #loading{
      position:fixed;inset:0;z-index:999;
      background:#efefec;
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
    }
    @media(prefers-color-scheme:dark){#loading{background:#131516}}
    #loading.exit{animation:fade-out .4s ease forwards}
    @keyframes fade-out{to{opacity:0;visibility:hidden}}

    #ld-logo{
      width:160px;height:auto;
      opacity:0;
      animation:logo-in .5s cubic-bezier(.34,1.56,.64,1) forwards,
                logo-breathe 2.4s ease-in-out .6s infinite;
    }
    #loading.exit #ld-logo{animation:logo-zoom-out .4s cubic-bezier(.4,0,.6,1) forwards !important}
    @media(prefers-color-scheme:dark){#ld-logo{filter:brightness(0) invert(1)}}
    @keyframes logo-in{from{opacity:0;transform:scale(.88)} to{opacity:1;transform:scale(1)}}
    @keyframes logo-breathe{0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.06);opacity:.85}}
    @keyframes logo-zoom-out{0%{transform:scale(1);opacity:1} 70%{transform:scale(2.5);opacity:1} 100%{transform:scale(4);opacity:0}}

    .ld-dots{display:flex;gap:6px}
    .ld-dot{width:6px;height:6px;border-radius:50%;background:#b8c0c0;animation:dot-pulse 1.4s ease-in-out infinite}
    .ld-dot:nth-child(2){animation-delay:.2s}
    .ld-dot:nth-child(3){animation-delay:.4s}
    @media(prefers-color-scheme:dark){.ld-dot{background:#505859}}
    @keyframes dot-pulse{0%,80%,100%{transform:scale(1);opacity:.5} 40%{transform:scale(1.3);opacity:1}}
  </style>
</head>
